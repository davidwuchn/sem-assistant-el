<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Organice (Self-hosted Endpoint)</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        background: #f5f7f9;
        color: #1f2933;
      }
      main {
        max-width: 760px;
        margin: 4rem auto;
        background: #fff;
        border: 1px solid #d9e2ec;
        border-radius: 12px;
        padding: 2rem;
      }
      h1 {
        margin-top: 0;
      }
      code {
        background: #f0f4f8;
        padding: 0.1rem 0.3rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Self-hosted organice endpoint</h1>
      <p>
        This domain is now served from your own infrastructure. Place your organice
        build artifacts in <code>static/organice/</code> to publish the full app.
      </p>
      <p>
        WebDAV cross-origin access from this origin is controlled by
        <code>ORGANICE_ORIGIN</code> on the WebDAV service.
      </p>
    </main>
  </body>
</html>
