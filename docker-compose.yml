version: "3.8"

services:
  emacs:
    build:
      context: .
      dockerfile: Dockerfile.emacs
    container_name: sem-emacs
    volumes:
      - ./data:/data:rw,z
      - ./logs:/var/log/sem:rw,z
      - ~/.ssh/vps-org-roam:/root/.ssh:ro
    environment:
      - OPENROUTER_KEY=${OPENROUTER_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - RSS_MAX_ENTRIES_PER_FEED=${RSS_MAX_ENTRIES_PER_FEED:-10}
      - RSS_MAX_INPUT_CHARS=${RSS_MAX_INPUT_CHARS:-199000}
      - SEM_WATCHDOG_PROBE_TIMEOUT_SEC=${SEM_WATCHDOG_PROBE_TIMEOUT_SEC:-45}
      - SEM_WATCHDOG_STARTUP_GRACE_SEC=${SEM_WATCHDOG_STARTUP_GRACE_SEC:-180}
      - OUTPUT_LANGUAGE=English
    depends_on:
      - webdav
    restart: unless-stopped

  webdav:
    image: docker.io/library/httpd:2.4
    container_name: sem-webdav
    volumes:
      - ./data:/data:rw,z
      - ./webdav/apache/start-webdav.sh:/usr/local/bin/start-webdav.sh:ro,z
      - ./webdav/apache/httpd-webdav.conf.template:/usr/local/apache2/conf/extra/httpd-webdav.conf.template:ro,z
      - /etc/letsencrypt:/certs:ro,z
    environment:
      - WEBDAV_DOMAIN=${WEBDAV_DOMAIN:-example.com}
      - WEBDAV_USERNAME=${WEBDAV_USERNAME:-orgzly}
      - WEBDAV_PASSWORD=${WEBDAV_PASSWORD:-changeme}
      - WEBDAV_RUNTIME_MODE=${WEBDAV_RUNTIME_MODE:-production}
      - WEBDAV_UID=${WEBDAV_UID:-1000}
      - WEBDAV_GID=${WEBDAV_GID:-1000}
    ports:
      - "${WEBDAV_PORT:-443}:6065"
    command: ["/bin/sh", "/usr/local/bin/start-webdav.sh"]
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: sem-certbot
    profiles:
      - certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:rw,z
      - /var/lib/letsencrypt:/var/lib/letsencrypt:rw,z
      - /var/log/letsencrypt:/var/log/letsencrypt:rw,z
    environment:
      - WEBDAV_DOMAIN=${WEBDAV_DOMAIN:-}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL:-}
      - CERTBOT_STAGING=${CERTBOT_STAGING:-true}
      - CERTBOT_RENEW_INTERVAL=${CERTBOT_RENEW_INTERVAL:-12h}
    ports:
      - "80:80"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'set -eu; if [ -z "$${WEBDAV_DOMAIN}" ]; then echo "[certbot] ERROR: WEBDAV_DOMAIN is not set."; exit 1; fi; if [ -z "$${CERTBOT_EMAIL}" ]; then echo "[certbot] ERROR: CERTBOT_EMAIL is not set."; exit 1; fi; certbot_flags=""; if [ "$${CERTBOT_STAGING}" = "true" ]; then certbot_flags="--staging"; echo "[certbot] Staging mode enabled (CERTBOT_STAGING=true)."; else echo "[certbot] Production mode enabled (CERTBOT_STAGING=false)."; fi; echo "[certbot] Requesting initial certificate for $${WEBDAV_DOMAIN} via HTTP-01 on port 80."; if certbot certonly --standalone --non-interactive --agree-tos --email "$${CERTBOT_EMAIL}" --preferred-challenges http -d "$${WEBDAV_DOMAIN}" $$certbot_flags; then echo "[certbot] Initial certificate request succeeded for $${WEBDAV_DOMAIN}."; else echo "[certbot] ERROR: Initial issuance failed."; echo "[certbot] Verify DNS resolves $${WEBDAV_DOMAIN} to this host, inbound TCP/80 is open, and no process is occupying port 80."; exit 1; fi; while true; do echo "[certbot] Running renewal check for $${WEBDAV_DOMAIN}."; if certbot renew --standalone --non-interactive --preferred-challenges http $$certbot_flags; then echo "[certbot] Renewal check complete."; else echo "[certbot] ERROR: Renewal failed. Check DNS, firewall, and ACME reachability for $${WEBDAV_DOMAIN}."; fi; echo "[certbot] Sleeping for $${CERTBOT_RENEW_INTERVAL} before next renewal check."; sleep "$${CERTBOT_RENEW_INTERVAL}"; done'
    restart: unless-stopped
