version: "3.8"

services:
  emacs:
    build:
      context: .
      dockerfile: Dockerfile.emacs
    container_name: sem-emacs
    volumes:
      - ./data:/data:rw,z
      - ./logs:/var/log/sem:rw,z
      - ~/.ssh/vps-org-roam:/root/.ssh:ro
    environment:
      - OPENROUTER_KEY=${OPENROUTER_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - RSS_MAX_ENTRIES_PER_FEED=${RSS_MAX_ENTRIES_PER_FEED:-10}
      - RSS_MAX_INPUT_CHARS=${RSS_MAX_INPUT_CHARS:-199000}
      - SEM_WATCHDOG_PROBE_TIMEOUT_SEC=${SEM_WATCHDOG_PROBE_TIMEOUT_SEC:-45}
      - SEM_WATCHDOG_STARTUP_GRACE_SEC=${SEM_WATCHDOG_STARTUP_GRACE_SEC:-180}
      - OUTPUT_LANGUAGE=English
    depends_on:
      - webdav
    restart: unless-stopped

  webdav:
    image: hacdias/webdav:latest
    container_name: sem-webdav
    volumes:
      - ./data:/data:rw,z
      - ./webdav-config.yml:/config.yml:ro,z
      - /etc/letsencrypt:/certs:ro,z
    environment:
      - WEBDAV_USERNAME=${WEBDAV_USERNAME:-orgzly}
      - WEBDAV_PASSWORD=${WEBDAV_PASSWORD:-changeme}
    ports:
      - "${WEBDAV_PORT:-443}:6065"
    command: ["--config", "/config.yml"]
    restart: unless-stopped
