# WebDAV configuration for integration tests
# Non-TLS, test-specific port mapping

# Server configuration
server:
  # Listen on port 6065 (mapped to 16065 externally in docker-compose.test.yml)
  port: 6065

  # No TLS in test environment
  tls: false

# User configuration with environment variable substitution
users:
  - username: '{env}WEBDAV_USERNAME'
    password: '{env}WEBDAV_PASSWORD'
    scope: /data
    # Allow all permissions
    permissions:
      read: true
      write: true
      create: true
      delete: true
      move: true

# Logging
log:
  format: console
  output: stdout
  # Redact sensitive information in logs
  redact:
    - password
