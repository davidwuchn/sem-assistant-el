version: "3.8"

services:
  emacs:
    volumes:
      - ./test-data:/data:rw,z
      - ./logs:/var/log/sem:rw,z
    environment:
      - OPENROUTER_KEY=${OPENROUTER_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - RSS_MAX_ENTRIES_PER_FEED=${RSS_MAX_ENTRIES_PER_FEED:-10}
      - RSS_MAX_INPUT_CHARS=${RSS_MAX_INPUT_CHARS:-199000}
      - OUTPUT_LANGUAGE=English
    restart: "no"

  webdav:
    image: hacdias/webdav:latest
    container_name: sem-webdav
    volumes:
      - ./test-data:/data:rw,z
      - ./dev/integration/webdav-config.test.yml:/config.yml:ro,z
      - ./dev/integration:/certs:ro,z
    environment:
      - WEBDAV_DOMAIN=${WEBDAV_DOMAIN:-example.com}
      - WEBDAV_USERNAME=${WEBDAV_USERNAME:-orgzly}
      - WEBDAV_PASSWORD=${WEBDAV_PASSWORD:-changeme}
      - WEBDAV_RUNTIME_MODE=${WEBDAV_RUNTIME_MODE:-integration-test}
    command: ["--config", "/config.yml"]
    restart: "no"

  certbot:
    profiles:
      - never
    restart: "no"
